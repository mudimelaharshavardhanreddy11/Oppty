<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and video</title>
</head>

<body>

    <section>



        <h1> Audio</h1>

        <div>

            <audio controls>
                <source src="./extrefiles/audio 1.wav">
            </audio>

        </div>

        <h3> audio autoplay</h3>

        <div>

            <audio controls autoplay>
                <source src="./extrefiles/audio 2.wav">
            </audio>

        </div>

        <h3> lopp </h3>

        <div>

            <audio controls loop>
                <source src="./extrefiles/Audio song 1.mp3">
            </audio>

        </div>


        <h3> muted</h3>


        <div>

            <audio controls muted>
                <source src="./extrefiles/audio 2.wav">
            </audio>

        </div>


        <h3> preload</h3>

        <div>

            <audio controls preload="none">
                <source src="./extrefiles/audio 2.wav">
            </audio>

        </div>

    
    </section>



    <section>

        <h1> video</h1>

        <div>

            <video width="320" height="240" controls>
                <source src="./extrefiles/funny video 1.mp4" type="video/mp4">
            </video>

        </div>


        <div>
            
        <br>

        <h3> Autoplay</h3>

        <video width="250" height="300" controls autoplay>
            <source src="./extrefiles/video 6.mp4" type="video/mp4">
        </video>

        <br>

        <h3> Loop</h3>

        <video width="250" height="300" controls loop>
            <source src="./extrefiles/funny video 3.mp4"> 
        </video>

        </div>

        <div>

            <h3> Muted</h3>

            <video width="300" height="230" controls muted>
                <source src="./extrefiles/funny video 4.mp4">
            </video>

            <h3>poster</h3>

            <video width="350" height="400" controls poster="./extrefiles/poster .webp">
                <source src="./extrefiles/funny video 5.mp4">
            </video>

        </div>


    </section>
</body>
</html>
